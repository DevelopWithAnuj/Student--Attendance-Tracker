<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="primary_gradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Main Background -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#primary_gradient)" />
  
  <!-- Subtle Inner Border/Highlight -->
  <rect x="4" y="4" width="56" height="56" rx="16" stroke="white" stroke-opacity="0.1" stroke-width="2" />

  <!-- Checkmark -->
  <path d="M20 32L28 40L44 24" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Small "AI" Dot Accent -->
  <circle cx="46" cy="22" r="3" fill="#ffffff" fill-opacity="0.9" />
</svg>